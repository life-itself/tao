<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio – Indented Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fafafa; padding: 24px; color: #333;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }

  .legend-bar {
    display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start;
    margin-bottom: 12px; font-size: 12px; color: #555;
  }
  .legend-group { display: flex; flex-direction: column; gap: 5px; }
  .legend-group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; margin-bottom: 2px; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .l-circle { width: 10px; height: 10px; border-radius: 50%; background: #4A90D9; flex-shrink: 0; }
  .l-grey   { width: 10px; height: 10px; border-radius: 50%; background: #AAAAAA; flex-shrink: 0; }

  .status-filters {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; font-size: 12px; align-items: center;
  }
  .status-filters strong { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  .sf-btn {
    display: flex; align-items: center; gap: 5px; padding: 2px 10px;
    border: 1px solid #ddd; border-radius: 12px; cursor: pointer;
    user-select: none; background: #fff; transition: opacity 0.15s;
  }
  .sf-btn.off { opacity: 0.35; }
  .sf-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sf-count { color: #aaa; font-size: 11px; }

  .tree { max-width: 900px; }
  .tree-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid #f0f0f0;
    cursor: default;
  }
  .tree-row:hover { background: #f5f8ff; }
  .tree-row.has-children { cursor: pointer; }
  .indent { flex-shrink: 0; }
  .toggle {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #999; user-select: none;
  }
  .dot-circle { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; }
  .dot-square { flex-shrink: 0; width: 10px; height: 10px; border-radius: 2px; }
  .name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .type-label { flex-shrink: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; color: #ccc; width: 60px; }
  .status-badge {
    flex-shrink: 0; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.3px; padding: 1px 6px; border-radius: 3px;
    background: #f0f0f0; color: #888;
  }
  .view-link {
    flex-shrink: 0; font-size: 11px; font-weight: 600;
    color: #4A90D9; text-decoration: none;
    border: 1px solid #dbe7f7; border-radius: 999px;
    padding: 2px 8px; background: #fff;
  }
  .view-link:hover { background: #f5f8ff; text-decoration: none; }
</style>
</head>
<body>

<h1>Portfolio – Indented Tree</h1>
<p class="subtitle">Click rows with children to collapse/expand. Use View to open the local page. Click a status to toggle it.</p>

<div class="legend-bar">
  <div class="legend-group">
    <div class="legend-group-label">Type (colour)</div>
    <div class="legend-item"><div class="l-circle" style="background:#4A90D9"></div> Initiative</div>
    <div class="legend-item"><div class="l-circle" style="background:#50B86C"></div> Project</div>
    <div class="legend-item"><div class="l-circle" style="background:#F2D96B;opacity:0.55"></div> Idea</div>
    <div class="legend-item"><div class="l-circle" style="background:transparent;border:2px solid #4A90D9;opacity:0.4"></div> Grouping</div>
  </div>
  <div class="legend-group">
    <div class="legend-group-label">Status (opacity)</div>
    <div class="legend-item"><div class="l-circle" style="background:#4A90D9;opacity:1.0"></div> Active</div>
    <div class="legend-item"><div class="l-circle" style="background:#4A90D9;opacity:0.7"></div> ⚙️ Maintenance</div>
    <div class="legend-item"><div class="l-circle" style="background:#4A90D9;opacity:0.25"></div> ⏸️ Paused</div>
    <div class="legend-item"><div class="l-circle" style="background:#4A90D9;opacity:0.15"></div> 🗄️ Archived</div>
  </div>
</div>

<div class="status-filters" id="status-filters">
  <strong>Filter:</strong>
</div>

<div class="tree" id="tree"></div>

<script src="index.js"></script>
<script>
const TYPE_COLOR     = { initiative: "#4A90D9", project: "#50B86C", idea: "#F2D96B" };
const STATUS_OPACITY = { active: 1.0, maintenance: 0.7, paused: 0.25, idea: 0.55, archived: 0.15 };
const STATUS_LABEL   = { active: "Active", maintenance: "⚙️ Maintenance", paused: "⏸️ Paused", idea: "Idea", archived: "🗄️ Archived" };
const STATUSES = ["active", "maintenance", "paused", "idea", "archived"];

const isGrouping = d => d.category === "grouping";
function nodeColor(d)   { return (d.status === "idea" || d.type === "idea") ? TYPE_COLOR.idea : (TYPE_COLOR[d.type] || "#AAAAAA"); }
function nodeOpacity(d) { return isGrouping(d) ? 0.35 : (STATUS_OPACITY[d.status] ?? 0.5); }

// Build status filter buttons — exclude grouping nodes from counts
const hiddenStatuses = new Set();
const counts = {};
STATUSES.forEach(s => counts[s] = PORTFOLIO_DATA.filter(d => d.status === s && !isGrouping(d)).length);

const filtersEl = document.getElementById("status-filters");
STATUSES.forEach(s => {
  if (!counts[s]) return;
  const btn = document.createElement("div");
  btn.className = "sf-btn";
  btn.id = "sfbtn-" + s;
  const dotColor = s === "idea" ? TYPE_COLOR.idea : "#4A90D9";
  btn.innerHTML = `<div class="sf-dot" style="background:${dotColor};opacity:${STATUS_OPACITY[s]}"></div>${STATUS_LABEL[s]}<span class="sf-count">${counts[s]}</span>`;
  btn.addEventListener("click", () => {
    if (hiddenStatuses.has(s)) hiddenStatuses.delete(s);
    else hiddenStatuses.add(s);
    btn.classList.toggle("off", hiddenStatuses.has(s));
    draw();
  });
  filtersEl.appendChild(btn);
});

function buildTree(entries) {
  const bySlug = new Map(entries.map(e => [e.slug, e]));
  const childrenMap = new Map();
  for (const e of entries) {
    if (e.parent && bySlug.has(e.parent)) {
      if (!childrenMap.has(e.parent)) childrenMap.set(e.parent, []);
      childrenMap.get(e.parent).push(e);
    }
  }
  const roots = entries.filter(e => !e.parent || !bySlug.has(e.parent));
  function toNode(entry, depth) {
    const kids = (childrenMap.get(entry.slug) || [])
      .sort((a, b) => (a.title || a.slug).localeCompare(b.title || b.slug));
    return { entry, depth, children: kids.map(k => toNode(k, depth + 1)) };
  }
  roots.sort((a, b) => {
    const aK = (childrenMap.get(a.slug) || []).length;
    const bK = (childrenMap.get(b.slug) || []).length;
    return bK !== aK ? bK - aK : (a.title || a.slug).localeCompare(b.title || b.slug);
  });
  return roots.map(r => toNode(r, 0));
}

const tree = buildTree(PORTFOLIO_DATA);
const collapsed = new Set();
const container = document.getElementById("tree");

function isVisible(node) { return !hiddenStatuses.has(node.entry.status || ""); }

function draw() {
  container.innerHTML = "";
  const flat = [];
  function flatten(nodes) {
    for (const node of nodes) {
      if (!isVisible(node)) continue;
      flat.push(node);
      if (node.children.length && !collapsed.has(node.entry.slug)) flatten(node.children);
    }
  }
  flatten(tree);

  for (const node of flat) {
    const e = node.entry;
    const visibleKids = node.children.filter(isVisible);
    const hasKids = visibleKids.length > 0;

    const row = document.createElement("div");
    row.className = "tree-row" + (hasKids ? " has-children" : "");

    const indent = document.createElement("div");
    indent.className = "indent";
    indent.style.width = (node.depth * 24) + "px";
    row.appendChild(indent);

    const toggle = document.createElement("div");
    toggle.className = "toggle";
    if (hasKids) toggle.textContent = collapsed.has(e.slug) ? "▶" : "▼";
    row.appendChild(toggle);

    const dot = document.createElement("div");
    dot.className = "dot-circle";
    if (isGrouping(e)) {
      dot.style.background = "transparent";
      dot.style.border = "2px solid " + nodeColor(e);
      dot.style.opacity = "0.4";
    } else {
      dot.style.background = nodeColor(e);
      dot.style.opacity = nodeOpacity(e);
    }
    row.appendChild(dot);

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = e.title || e.slug;
    name.style.opacity = nodeOpacity(e);
    row.appendChild(name);

    const typeLabel = document.createElement("div");
    typeLabel.className = "type-label";
    typeLabel.textContent = e.type;
    row.appendChild(typeLabel);

    if (e.status) {
      const badge = document.createElement("span");
      badge.className = "status-badge";
      badge.textContent = STATUS_LABEL[e.status] || e.status;
      row.appendChild(badge);
    }

    if (e.sitePath) {
      const viewLink = document.createElement("a");
      viewLink.className = "view-link";
      viewLink.href = e.sitePath;
      viewLink.textContent = "View";
      viewLink.addEventListener("click", clickEvent => clickEvent.stopPropagation());
      row.appendChild(viewLink);
    }

    if (hasKids) {
      row.addEventListener("click", () => {
        collapsed.has(e.slug) ? collapsed.delete(e.slug) : collapsed.add(e.slug);
        draw();
      });
    }

    container.appendChild(row);
  }
}

draw();
</script>
</body>
</html>
